<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATC Ground Control</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- The airport map lives here -->
     <canvas id="airport-canvas"></canvas>

        <div id="strip-board"></div>

    <script src="src/airport/layout.js"></script>
    <script src="src/airport/taxiways.js"></script>
    <script src="src/core/aircraft.js"></script>
    <script src="src/core/physics.js"></script>
    <script src="src/ui/hud.js"></script>
    <script src="src/ui/strips.js"></script>
    <script src="src/ui/comms.js"></script>
    <script src="src/core/game.js"></script>

</html>
